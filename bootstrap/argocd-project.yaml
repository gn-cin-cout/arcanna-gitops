apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: arcanna
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Arcanna AIOps platform — sandbox deployment

  sourceRepos:
    # Chart source repo (arcanna-helm). Replace with your actual remote URL.
    - https://github.com/gn-cin-cout/arcanna-helm
    # GitOps repo (this repo — arcanna-gitops). Replace with your actual remote URL.
    - https://github.com/gn-cin-cout/arcanna-gitops

  destinations:
    - namespace: arcanna
      server: https://kubernetes.default.svc  # in-cluster; replace if ArgoCD is external
    - namespace: argocd
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    # ECK CRDs (Elasticsearch, Kibana)
    - group: elasticsearch.k8s.elastic.co
      kind: Elasticsearch
    - group: kibana.k8s.elastic.co
      kind: Kibana
    # CFK CRDs (Kafka, KRaftController)
    - group: platform.confluent.io
      kind: Kafka
    - group: platform.confluent.io
      kind: KRaftController
