apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: arcanna
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Arcanna AIOps platform — sandbox deployment

  sourceRepos:
    - https://github.com/gn-cin-cout/arcanna-helm
    - https://github.com/gn-cin-cout/arcanna-gitops
    # Operator Helm repos
    - https://helm.elastic.co
    - https://packages.confluent.io/helm
    - https://charts.external-secrets.io

  destinations:
    - namespace: arcanna
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
    # ECK operator namespace
    - namespace: elastic-system
      server: https://kubernetes.default.svc
    # CFK operator namespace
    - namespace: confluent
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    # Allow all cluster-scoped resources (operators install CRDs, ClusterRoles, etc.)
    - group: "*"
      kind: "*"
