# ClusterSecretStore — points ESO at Google Secret Manager for this GKE cluster.
# Uses Workload Identity: ESO's K8s SA (external-secrets/external-secrets) is
# bound to the GCP SA (arcanna-eso-sa) via WI, so no credentials are stored here.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secretmanager
spec:
  provider:
    gcpsm:
      projectID: playground-s-11-1bc8eaaf
      auth:
        workloadIdentity:
          clusterLocation: us-central1-a
          clusterName: arcanna-learning
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
