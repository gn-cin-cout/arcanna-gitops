# ExternalSecrets — ESO reads from GSM and creates K8s Secrets in namespace arcanna.
# Each ExternalSecret maps GSM secret names → K8s Secret keys.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: arcanna
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secretmanager
    kind: ClusterSecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: user
      remoteRef:
        key: arcanna-postgres-user
    - secretKey: password
      remoteRef:
        key: arcanna-postgres-password
    - secretKey: database
      remoteRef:
        key: arcanna-postgres-database
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-credentials
  namespace: arcanna
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secretmanager
    kind: ClusterSecretStore
  target:
    name: redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: arcanna-redis-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: arcanna-app-credentials
  namespace: arcanna
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secretmanager
    kind: ClusterSecretStore
  target:
    name: arcanna-app-credentials
    creationPolicy: Owner
  data:
    - secretKey: seal-token
      remoteRef:
        key: arcanna-seal-token
    - secretKey: api-token
      remoteRef:
        key: arcanna-api-token
    - secretKey: rag-api-key
      remoteRef:
        key: arcanna-rag-api-key
    - secretKey: monitoring-api-key
      remoteRef:
        key: arcanna-monitoring-api-key
    - secretKey: monitoring-secret
      remoteRef:
        key: arcanna-monitoring-secret
