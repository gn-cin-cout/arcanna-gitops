# ── Phase 6 ── App: Worker (StatefulSet) ──────────────────────────────────────
# REQUIRES: GCR pull secret + image tag from Arcanna team.
# Uses StatefulSet (not Deployment) — logs are stored in volumeClaimTemplates.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arcanna-worker
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: arcanna

  source:
    repoURL: https://github.com/gn-cin-cout/arcanna-helm
    targetRevision: HEAD
    path: charts/modular-service
    helm:
      valueFiles:
        - ../../envs/gke-sandbox/_common.yaml
        - ../../envs/gke-sandbox/services/worker.yaml
      parameters:
        - name: image.tag
          value: "ARCANNA_IMAGE_TAG"

  destination:
    server: https://kubernetes.default.svc
    namespace: arcanna

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
