# ── Wave 1 ── Config: ClusterSecretStore + ExternalSecrets ───────────────────
# Deploys the SecretStore (points ESO at GSM) and ExternalSecret CRDs
# (postgres-credentials, redis-credentials, arcanna-app-credentials).
# ArgoCD waits until ESO has created all K8s Secrets before wave 2 proceeds.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arcanna-external-secrets-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: arcanna

  source:
    repoURL: https://github.com/gn-cin-cout/arcanna-gitops
    targetRevision: HEAD
    path: secrets/gke-sandbox

  destination:
    server: https://kubernetes.default.svc
    namespace: arcanna

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
