apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arcanna-nginx
  namespace: argocd
spec:
  project: arcanna-project
  source:
    repoURL: https://github.com/gn-cin-cout/arcanna-gitops
    targetRevision: main
    path: manifests/nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: arcanna
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
